<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Typing Speed Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <script defer src="./js/controller.js"></script>
  </head>
  <body>
    <header class="header">
      <img src="./assets/images/logo-large.svg" alt="" class="header__logo" />
      <div class="best-score">
        <img
          src="./assets/images/icon-personal-best.svg"
          class="best-score__icon"
          alt="Personal Best icon"
        />
        <p class="best-score__text">
          Personal best:&nbsp;<span class="best-score__value">0&nbsp;WMP</span>
        </p>
      </div>
    </header>
    <main class="main">
      <div class="config-logs-container">
        <div class="typing-info">
          <p class="typing-info__wpm">
            WPM:&nbsp;<span class="typing-info__wpm-value">0</span>
          </p>
          <p class="typing-info__acuuracy">
            Accuracy:&nbsp;<span class="typing-info__accuracy-value">100%</span>
          </p>
          <p class="typing-info__time">
            Time:&nbsp;<span class="typing-info__time-value">0:60</span>
          </p>
        </div>
        <div class="typing-options">
          <div class="difficulty">
            <p class="difficulty__text">Difficulty:</p>
            <div class="difficulty__btns">
              <button class="btn">Easy</button>
              <button class="btn">Medium</button>
              <button class="btn">Hard</button>
            </div>
          </div>
          <div class="mode">
            <p class="mode__text">Mode:</p>
            <div class="mode__btns">
              <button class="btn">Timed (60s)</button>
              <button class="btn">Passage</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
