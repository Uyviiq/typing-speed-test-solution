<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Typing Speed Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <script defer src="./js/model.js"></script>
  </head>
  <body>
    <header class="header">
      <img src="./assets/images/logo-large.svg" alt="" class="header__logo" />
      <div class="best-score">
        <img
          src="./assets/images/icon-personal-best.svg"
          class="best-score__icon"
          alt="Personal Best icon"
        />
        <p class="best-score__text">
          Personal best:&nbsp;<span class="best-score__value">0 WMP</span>
        </p>
      </div>
    </header>

</html>
